# ~/.config/atv-couch-wake/config.toml

[tv]
host = "10.0.0.42"
port = 5555
name = "Living Room TCL"
model = "TCL Google TV"
adb_path = "/usr/bin/adb"
input_id = "com.tcl.tvinput/.TvPassThroughService/HW15"
input_uri = "content://android.media.tv/passthrough/com.tcl.tvinput%2F.TvPassThroughService%2FHW15"
input_label = "Gaming PC"

[behavior]
on_startup = true
on_resume = true
off_on_suspend = true
off_on_shutdown = true
off_on_reboot = false
switch_input_after_wake = true
startup_delay_seconds = 3.0
wake_attempts = 5
wake_retry_seconds = 2.0
wake_settle_seconds = 2.0
input_settle_seconds = 1.0
command_timeout_seconds = 3.0
connect_timeout_seconds = 2.5

[controller_wake]
enabled = true
controller_name = "8BitDo USB Adapter 2"
usb_root = "usb3"
pci_controller = "0000:12:00.4"
mode = "selective"
verified = true
settle_delay_seconds = 2.0
rule_path = "/etc/udev/rules.d/90-atv-couch-wake-controller.rules"

[service]
inhibitor_delay_max_seconds = 4.5
ui_backend = "auto"
